<!DOCTYPE html><html lang="en"><head><meta name="x-poe-datastore-behavior" content="local_only"><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lucky Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&amp;family=Nunito:wght@600;700;800&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f8;
    --text: #2d2d3a;
    --card-bg: rgba(255,255,255,0.85);
    --shadow: rgba(0,0,0,0.12);
    --result-bg: rgba(255,255,255,0.95);
    --glow: rgba(77,136,255,0.3);
  }
  .dark {
    --bg: #1a1a2e;
    --text: #e8e8f0;
    --card-bg: rgba(30,30,50,0.85);
    --shadow: rgba(0,0,0,0.4);
    --result-bg: rgba(30,30,50,0.95);
    --glow: rgba(77,136,255,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: background 0.3s;
  }

  .dark body { background: var(--bg); }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 16px;
    width: 100%;
    max-width: 520px;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    text-align: center;
    background: linear-gradient(135deg, #e74c6f, #ff8a5c, #f7c948);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 4px var(--shadow));
    animation: titlePulse 3s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  .wheel-wrapper {
    position: relative;
    width: min(88vw, 440px);
    height: min(88vw, 440px);
  }

  canvas#wheelCanvas {
    width: 100%;
    height: 100%;
    display: block;
    filter: drop-shadow(0 8px 24px var(--shadow));
  }

  .pointer-container {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
  }

  .pointer {
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 40px solid #c0392b;
    position: relative;
  }
  .pointer::after {
    content: '';
    position: absolute;
    top: -46px;
    left: -10px;
    width: 20px;
    height: 20px;
    background: #e74c3c;
    border-radius: 50%;
    border: 3px solid #c0392b;
  }

  .go-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: clamp(70px, 18vw, 90px);
    height: clamp(70px, 18vw, 90px);
    border-radius: 50%;
    border: 5px solid #f7c948;
    background: radial-gradient(circle at 40% 35%, #e74c6f, #c0392b);
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    letter-spacing: 2px;
    cursor: pointer;
    z-index: 20;
    box-shadow: 0 4px 16px rgba(199,55,55,0.4), inset 0 -3px 8px rgba(0,0,0,0.2);
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .go-btn:hover:not(:disabled) {
    transform: translate(-50%, -50%) scale(1.08);
    box-shadow: 0 6px 24px rgba(199,55,55,0.55), inset 0 -3px 8px rgba(0,0,0,0.2);
  }
  .go-btn:active:not(:disabled) {
    transform: translate(-50%, -50%) scale(0.96);
  }
  .go-btn:disabled {
    cursor: not-allowed;
    opacity: 0.7;
  }

  .result-panel {
    width: 100%;
    min-height: 60px;
    background: var(--result-bg);
    border-radius: 16px;
    padding: 16px 20px;
    text-align: center;
    box-shadow: 0 4px 20px var(--shadow);
    backdrop-filter: blur(10px);
    transition: all 0.4s ease;
    border: 1px solid rgba(231,76,111,0.15);
  }

  .result-label {
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: 0.5;
    margin-bottom: 4px;
  }

  .result-text {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    color: #e74c6f;
    min-height: 1.8em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 100;
  }

  /* Bulb animation on the canvas ring */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .container > * {
    animation: fadeIn 0.6s ease-out both;
  }
  .container > *:nth-child(1) { animation-delay: 0.1s; }
  .container > *:nth-child(2) { animation-delay: 0.25s; }
  .container > *:nth-child(3) { animation-delay: 0.4s; }
</style>
</head>
<body>

<canvas class="confetti-canvas" id="confettiCanvas"></canvas>

<div class="container">
  <h1>🎰 Lucky Wheel 🎰</h1>

  <div class="wheel-wrapper">
    <canvas id="wheelCanvas"></canvas>
    <div class="pointer-container">
      <div class="pointer"></div>
    </div>
    <button class="go-btn" id="goBtn">GO</button>
  </div>

  <div class="result-panel">
    <div class="result-label">Result</div>
    <div class="result-text" id="resultText">Tap GO to spin!</div>
  </div>
</div>

<script>
// Dark mode detection
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
  document.documentElement.classList.add('dark');
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
  if (event.matches) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
});

// ─── Wheel Config ───
const prizes = [
  { label: '🎁 Gift',     color: '#f8a5c2' },
  { label: '💰 $100',     color: '#9b9ecf' },
  { label: '⭐ Bonus',    color: '#f5c6d0' },
  { label: '🍀 Luck',     color: '#e77f9e' },
  { label: '🏆 Jackpot',  color: '#f8a5c2' },
  { label: '💎 Diamond',  color: '#9b9ecf' },
  { label: '🎉 Party',    color: '#f5c6d0' },
  { label: '🔥 Fire',     color: '#c0392b' },
  { label: '💫 Star',     color: '#f8a5c2' },
  { label: '🎵 Music',    color: '#9b9ecf' },
  { label: '🌈 Rainbow',  color: '#f5c6d0' },
  { label: '🚀 Rocket',   color: '#e77f9e' },
];

const NUM_SEGMENTS = prizes.length;
const ARC = (2 * Math.PI) / NUM_SEGMENTS;
const NUM_BULBS = 28;

// ─── Canvas Setup ───
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

function resize() {
  const wrapper = canvas.parentElement;
  const size = wrapper.clientWidth;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

let currentAngle = 0;
let spinning = false;
let bulbPhase = 0;

// ─── Draw Wheel ───
function drawWheel(angle) {
  const w = canvas.width / dpr;
  const h = canvas.height / dpr;
  const cx = w / 2;
  const cy = h / 2;
  const outerR = Math.min(cx, cy) - 4;
  const ringW = outerR * 0.075;
  const wheelR = outerR - ringW;
  const innerR = wheelR * 0.22;

  ctx.clearRect(0, 0, w, h);

  // ── Blue outer ring ──
  ctx.beginPath();
  ctx.arc(cx, cy, outerR, 0, 2 * Math.PI);
  ctx.closePath();
  const ringGrad = ctx.createRadialGradient(cx, cy, wheelR, cx, cy, outerR);
  ringGrad.addColorStop(0, '#5b9bd5');
  ringGrad.addColorStop(0.5, '#6aabe6');
  ringGrad.addColorStop(1, '#4a8ac4');
  ctx.fillStyle = ringGrad;
  ctx.fill();
  ctx.strokeStyle = '#3a78b0';
  ctx.lineWidth = 2;
  ctx.stroke();

  // ── Yellow bulbs on ring ──
  const bulbR = ringW * 0.28;
  const bulbDist = outerR - ringW / 2;
  for (let i = 0; i < NUM_BULBS; i++) {
    const a = (2 * Math.PI * i) / NUM_BULBS;
    const bx = cx + Math.cos(a) * bulbDist;
    const by = cy + Math.sin(a) * bulbDist;
    const on = (i + bulbPhase) % 3 !== 0;

    ctx.beginPath();
    ctx.arc(bx, by, bulbR, 0, 2 * Math.PI);
    if (on) {
      const glow = ctx.createRadialGradient(bx, by, 0, bx, by, bulbR * 2.5);
      glow.addColorStop(0, '#fff45d');
      glow.addColorStop(0.5, '#f7c948');
      glow.addColorStop(1, 'rgba(247,201,72,0)');
      ctx.fillStyle = glow;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bx, by, bulbR, 0, 2 * Math.PI);
      ctx.fillStyle = '#f7e14d';
    } else {
      ctx.fillStyle = '#d4b83a';
    }
    ctx.fill();
    ctx.strokeStyle = '#c9a82c';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // ── Wheel white border ──
  ctx.beginPath();
  ctx.arc(cx, cy, wheelR + 2, 0, 2 * Math.PI);
  ctx.closePath();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.stroke();

  // ── Segments ──
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  for (let i = 0; i < NUM_SEGMENTS; i++) {
    const startA = ARC * i;
    const endA = startA + ARC;

    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, wheelR, startA, endA);
    ctx.closePath();
    ctx.fillStyle = prizes[i].color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Label
    ctx.save();
    ctx.rotate(startA + ARC / 2);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.round(wheelR * 0.085)}px 'Nunito', sans-serif`;
    ctx.shadowColor = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur = 3;
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 1;
    ctx.fillText(prizes[i].label, wheelR * 0.62, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  ctx.restore();
}

// ─── Confetti ───
const confettiCanvas = document.getElementById('confettiCanvas');
const cctx = confettiCanvas.getContext('2d');
let confettiPieces = [];
let confettiActive = false;

function resizeConfetti() {
  confettiCanvas.width = window.innerWidth * dpr;
  confettiCanvas.height = window.innerHeight * dpr;
  confettiCanvas.style.width = window.innerWidth + 'px';
  confettiCanvas.style.height = window.innerHeight + 'px';
  cctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeConfetti();
window.addEventListener('resize', resizeConfetti);

function launchConfetti() {
  confettiPieces = [];
  const colors = ['#e74c6f','#f7c948','#5b9bd5','#f8a5c2','#9b9ecf','#ff8a5c','#2ecc71','#fff'];
  for (let i = 0; i < 120; i++) {
    confettiPieces.push({
      x: window.innerWidth / 2 + (Math.random() - 0.5) * 200,
      y: window.innerHeight / 2,
      vx: (Math.random() - 0.5) * 14,
      vy: -Math.random() * 16 - 4,
      w: Math.random() * 10 + 5,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 15,
      life: 1,
    });
  }
  confettiActive = true;
}

function updateConfetti() {
  if (!confettiActive) return;
  cctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  let alive = 0;
  confettiPieces.forEach(p => {
    p.x += p.vx;
    p.vy += 0.35;
    p.y += p.vy;
    p.rot += p.rotV;
    p.life -= 0.008;
    if (p.life <= 0) return;
    alive++;
    cctx.save();
    cctx.translate(p.x, p.y);
    cctx.rotate((p.rot * Math.PI) / 180);
    cctx.globalAlpha = p.life;
    cctx.fillStyle = p.color;
    cctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    cctx.restore();
  });
  if (alive === 0) {
    confettiActive = false;
    cctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  }
}

// ─── Spin Logic ───
const goBtn = document.getElementById('goBtn');
const resultText = document.getElementById('resultText');

goBtn.addEventListener('click', startSpin);

function startSpin() {
  if (spinning) return;
  spinning = true;
  goBtn.disabled = true;
  resultText.textContent = 'Spinning...';

  const extraSpins = 5 + Math.random() * 5;
  const targetAngle = currentAngle + extraSpins * 2 * Math.PI + Math.random() * 2 * Math.PI;
  const duration = 4500 + Math.random() * 1500;
  const startTime = performance.now();
  const startAngle = currentAngle;

  function easeOutQuart(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function animateSpin(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    currentAngle = startAngle + (targetAngle - startAngle) * easeOutQuart(t);

    if (t < 1) {
      requestAnimationFrame(animateSpin);
    } else {
      currentAngle = targetAngle % (2 * Math.PI);
      spinning = false;
      goBtn.disabled = false;
      showResult();
      launchConfetti();
    }
  }
  requestAnimationFrame(animateSpin);
}

function showResult() {
  // Pointer is at top (angle = -PI/2 or 3PI/2)
  // We need to find which segment the pointer is pointing at
  const pointerAngle = (2 * Math.PI * 3 / 4); // top = 270 degrees
  const normalizedAngle = ((pointerAngle - currentAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  const index = Math.floor(normalizedAngle / ARC) % NUM_SEGMENTS;
  resultText.innerHTML = `🎊 ${prizes[index].label} 🎊`;
}

// ─── Animation Loop ───
let lastBulbTime = 0;

function mainLoop(ts) {
  if (ts - lastBulbTime > 350) {
    bulbPhase = (bulbPhase + 1) % 3;
    lastBulbTime = ts;
  }
  drawWheel(currentAngle);
  updateConfetti();
  requestAnimationFrame(mainLoop);
}
requestAnimationFrame(mainLoop);
</script>



</body></html>
