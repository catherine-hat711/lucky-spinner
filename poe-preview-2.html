<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lucky Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&amp;family=Righteous&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --bg-start: #fef3e2;
    --bg-end: #fde2e4;
    --text: #3d2c2c;
    --panel-bg: rgba(255,255,255,0.88);
    --panel-border: rgba(231,76,111,0.12);
    --shadow-soft: 0 8px 32px rgba(120,60,80,0.12);
    --accent: #e74c6f;
  }
  html.dark {
    --bg-start: #16131e;
    --bg-end: #1e1a2d;
    --text: #ede6f5;
    --panel-bg: rgba(32,28,48,0.92);
    --panel-border: rgba(231,76,111,0.2);
    --shadow-soft: 0 8px 32px rgba(0,0,0,0.35);
    --accent: #f2789f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Baloo 2', cursive, sans-serif;
    background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    transition: background 0.4s;
  }

  .app {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    padding: 14px;
    width: 100%;
    max-width: 500px;
    animation: appIn 0.7s ease-out;
  }

  @keyframes appIn {
    from { opacity: 0; transform: translateY(24px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .title {
    font-family: 'Righteous', cursive;
    font-size: clamp(1.5rem, 6vw, 2.5rem);
    text-align: center;
    background: linear-gradient(135deg, #e74c6f 0%, #f59e42 50%, #f7c948 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    letter-spacing: 1px;
  }

  .wheel-area {
    position: relative;
    width: min(85vw, 420px);
    height: min(85vw, 420px);
    flex-shrink: 0;
  }

  #wheelCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Pointer */
  .arrow {
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 15;
    width: 40px;
    height: 52px;
  }
  .arrow svg { width: 100%; height: 100%; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.3)); }

  /* GO Button */
  .spin-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: clamp(66px, 17vw, 88px);
    height: clamp(66px, 17vw, 88px);
    border-radius: 50%;
    border: 5px solid #f7c948;
    background: radial-gradient(circle at 38% 32%, #f2789f, #c0392b 80%);
    color: #fff;
    font-family: 'Righteous', cursive;
    font-size: clamp(1.2rem, 4.5vw, 1.7rem);
    letter-spacing: 3px;
    cursor: pointer;
    z-index: 20;
    box-shadow:
      0 0 0 3px rgba(199,55,55,0.25),
      0 6px 20px rgba(180,40,60,0.45),
      inset 0 -4px 10px rgba(0,0,0,0.2),
      inset 0 2px 6px rgba(255,255,255,0.15);
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    outline: none;
  }
  .spin-btn:hover:not(:disabled) {
    transform: translate(-50%, -50%) scale(1.07);
    box-shadow:
      0 0 0 3px rgba(199,55,55,0.35),
      0 8px 28px rgba(180,40,60,0.55),
      inset 0 -4px 10px rgba(0,0,0,0.2),
      inset 0 2px 6px rgba(255,255,255,0.15);
  }
  .spin-btn:active:not(:disabled) { transform: translate(-50%, -50%) scale(0.95); }
  .spin-btn:disabled { opacity: 0.6; cursor: default; }

  /* Result Panel */
  .result {
    width: 100%;
    background: var(--panel-bg);
    backdrop-filter: blur(12px);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    padding: 14px 20px;
    text-align: center;
    box-shadow: var(--shadow-soft);
  }
  .result-label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.45;
  }
  .result-value {
    font-family: 'Righteous', cursive;
    font-size: clamp(1.15rem, 4.2vw, 1.55rem);
    color: var(--accent);
    margin-top: 2px;
    min-height: 1.6em;
    transition: color 0.3s;
  }

  /* History */
  .history {
    width: 100%;
    max-height: 90px;
    overflow-y: auto;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    padding: 2px 0;
  }
  .history-chip {
    font-size: 0.78rem;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(6px);
    animation: chipIn 0.35s ease-out;
    white-space: nowrap;
  }
  @keyframes chipIn {
    from { opacity: 0; transform: scale(0.7); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Confetti overlay */
  #confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="app">
  <div class="title">Lucky Wheel</div>

  <div class="wheel-area">
    <canvas id="wheelCanvas"></canvas>

    <!-- SVG Pointer -->
    <div class="arrow">
      <svg viewBox="0 0 40 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="8" r="7.5" fill="#e74c3c" stroke="#a93226" stroke-width="2"></circle>
        <path d="M10 14 L20 50 L30 14 Z" fill="#c0392b" stroke="#922b21" stroke-width="1"></path>
      </svg>
    </div>

    <button class="spin-btn" id="spinBtn">GO</button>
  </div>

  <div class="result">
    <div class="result-label">Prize</div>
    <div class="result-value" id="prizeText">Tap GO to try your luck!</div>
  </div>

  <div class="history" id="history"></div>
</div>

<script>
/* ── Dark Mode ── */
(function(){
  const mq = window.matchMedia('(prefers-color-scheme: dark)');
  function apply(e){ document.documentElement.classList.toggle('dark', e.matches); }
  apply(mq);
  mq.addEventListener('change', apply);
})();

/* ── Config ── */
const PRIZES = [
  { text: 'Gift',    emoji: '🎁', bg: '#f8a5c2' },
  { text: '$500',    emoji: '💰', bg: '#a29bfe' },
  { text: 'Bonus',   emoji: '⭐', bg: '#f5c6d0' },
  { text: 'Luck',    emoji: '🍀', bg: '#e17b97' },
  { text: 'Jackpot', emoji: '🏆', bg: '#f8a5c2' },
  { text: 'Diamond', emoji: '💎', bg: '#a29bfe' },
  { text: 'Party',   emoji: '🎉', bg: '#f5c6d0' },
  { text: '$1000',   emoji: '🔥', bg: '#c0392b' },
  { text: 'Star',    emoji: '💫', bg: '#f8a5c2' },
  { text: 'Music',   emoji: '🎵', bg: '#a29bfe' },
  { text: 'Rainbow', emoji: '🌈', bg: '#f5c6d0' },
  { text: 'Rocket',  emoji: '🚀', bg: '#e17b97' },
];
const N = PRIZES.length;
const SLICE = (2 * Math.PI) / N;
const BULB_COUNT = 24;

/* ── Canvas ── */
const cvs = document.getElementById('wheelCanvas');
const c = cvs.getContext('2d');
const DPR = Math.min(window.devicePixelRatio || 1, 3);

function sizeCanvas() {
  const box = cvs.parentElement;
  const s = box.clientWidth;
  cvs.width = s * DPR;
  cvs.height = s * DPR;
  cvs.style.width = s + 'px';
  cvs.style.height = s + 'px';
  c.setTransform(DPR, 0, 0, DPR, 0, 0);
}
sizeCanvas();
window.addEventListener('resize', sizeCanvas);

let angle = 0;
let isSpinning = false;
let bulbTick = 0;
let bulbTimer = 0;

/* ── Draw ── */
function draw(t) {
  const S = cvs.width / DPR;
  const cx = S / 2, cy = S / 2;
  const R = S / 2 - 6;
  const ringT = R * 0.08;
  const wR = R - ringT;

  c.clearRect(0, 0, S, S);

  /* Outer glow */
  const outerGlow = c.createRadialGradient(cx, cy, wR, cx, cy, R + 8);
  outerGlow.addColorStop(0, 'rgba(90,155,213,0)');
  outerGlow.addColorStop(0.7, 'rgba(90,155,213,0.12)');
  outerGlow.addColorStop(1, 'rgba(90,155,213,0)');
  c.fillStyle = outerGlow;
  c.fillRect(0, 0, S, S);

  /* Blue ring */
  c.beginPath();
  c.arc(cx, cy, R, 0, Math.PI * 2);
  const rg = c.createRadialGradient(cx, cy * 0.92, wR * 0.9, cx, cy, R);
  rg.addColorStop(0, '#6bb3e8');
  rg.addColorStop(0.6, '#5a9fd8');
  rg.addColorStop(1, '#4889c2');
  c.fillStyle = rg;
  c.fill();
  c.lineWidth = 2;
  c.strokeStyle = '#3b74a8';
  c.stroke();

  /* Bulbs */
  const bR = ringT * 0.32;
  const bDist = R - ringT / 2;
  for (let i = 0; i < BULB_COUNT; i++) {
    const a = (Math.PI * 2 * i) / BULB_COUNT - Math.PI / 2;
    const bx = cx + Math.cos(a) * bDist;
    const by = cy + Math.sin(a) * bDist;
    const on = (i + bulbTick) % 2 === 0;

    if (on) {
      c.beginPath();
      c.arc(bx, by, bR * 2.8, 0, Math.PI * 2);
      const gl = c.createRadialGradient(bx, by, 0, bx, by, bR * 2.8);
      gl.addColorStop(0, 'rgba(255,244,93,0.5)');
      gl.addColorStop(1, 'rgba(255,244,93,0)');
      c.fillStyle = gl;
      c.fill();
    }

    c.beginPath();
    c.arc(bx, by, bR, 0, Math.PI * 2);
    c.fillStyle = on ? '#ffe94a' : '#bfa630';
    c.fill();
    c.lineWidth = 0.8;
    c.strokeStyle = '#b89a22';
    c.stroke();
  }

  /* White inner border */
  c.beginPath();
  c.arc(cx, cy, wR + 1.5, 0, Math.PI * 2);
  c.lineWidth = 3;
  c.strokeStyle = '#fff';
  c.stroke();

  /* Segments */
  c.save();
  c.translate(cx, cy);
  c.rotate(angle);

  for (let i = 0; i < N; i++) {
    const sA = SLICE * i;
    const eA = sA + SLICE;

    /* Slice fill */
    c.beginPath();
    c.moveTo(0, 0);
    c.arc(0, 0, wR, sA, eA);
    c.closePath();
    c.fillStyle = PRIZES[i].bg;
    c.fill();

    /* Thin separator */
    c.lineWidth = 1.2;
    c.strokeStyle = 'rgba(255,255,255,0.4)';
    c.stroke();

    /* Text */
    c.save();
    c.rotate(sA + SLICE / 2);

    const fontSize = Math.max(11, Math.round(wR * 0.075));
    c.font = '700 ' + fontSize + 'px "Baloo 2", cursive, sans-serif';
    c.textAlign = 'center';
    c.textBaseline = 'middle';

    /* Emoji */
    c.font = Math.round(fontSize * 1.35) + 'px sans-serif';
    c.fillText(PRIZES[i].emoji, wR * 0.72, 0);

    /* Label */
    c.font = '700 ' + fontSize + 'px "Baloo 2", cursive, sans-serif';
    c.fillStyle = '#fff';
    c.shadowColor = 'rgba(0,0,0,0.4)';
    c.shadowBlur = 3;
    c.fillText(PRIZES[i].text, wR * 0.48, 0);
    c.shadowBlur = 0;

    c.restore();
  }

  /* Center decorative circle */
  c.beginPath();
  c.arc(0, 0, wR * 0.18, 0, Math.PI * 2);
  const cg = c.createRadialGradient(0, -wR * 0.04, 0, 0, 0, wR * 0.18);
  cg.addColorStop(0, '#ffeaa7');
  cg.addColorStop(0.5, '#f7c948');
  cg.addColorStop(1, '#d4a017');
  c.fillStyle = cg;
  c.fill();
  c.lineWidth = 2;
  c.strokeStyle = '#c99a0e';
  c.stroke();

  c.restore();
}

/* ── Spin ── */
const spinBtn = document.getElementById('spinBtn');
const prizeText = document.getElementById('prizeText');
const historyEl = document.getElementById('history');
const history = [];

spinBtn.addEventListener('click', spin);

function spin() {
  if (isSpinning) return;
  isSpinning = true;
  spinBtn.disabled = true;
  prizeText.textContent = 'Spinning...';

  const spins = 6 + Math.random() * 6;
  const target = angle + spins * Math.PI * 2 + Math.random() * Math.PI * 2;
  const dur = 4800 + Math.random() * 1800;
  const t0 = performance.now();
  const a0 = angle;

  function ease(x) { return 1 - Math.pow(1 - x, 4); }

  function tick(now) {
    const p = Math.min((now - t0) / dur, 1);
    angle = a0 + (target - a0) * ease(p);
    if (p < 1) {
      requestAnimationFrame(tick);
    } else {
      angle = target % (Math.PI * 2);
      isSpinning = false;
      spinBtn.disabled = false;
      revealPrize();
      fireConfetti();
    }
  }
  requestAnimationFrame(tick);
}

function revealPrize() {
  /* Pointer is at top = 3π/2 (270°) */
  const pA = Math.PI * 1.5;
  const norm = ((pA - angle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  const idx = Math.floor(norm / SLICE) % N;
  const p = PRIZES[idx];
  prizeText.textContent = p.emoji + ' ' + p.text + '!';

  /* Add to history */
  history.unshift(p.emoji + ' ' + p.text);
  if (history.length > 12) history.pop();
  historyEl.innerHTML = history.map(function(h) {
    return '<span class="history-chip">' + h + '</span>';
  }).join('');
}

/* ── Confetti ── */
const ccvs = document.getElementById('confetti');
const cc = ccvs.getContext('2d');
let pieces = [];
let confettiOn = false;

function sizeConfetti() {
  ccvs.width = window.innerWidth * DPR;
  ccvs.height = window.innerHeight * DPR;
  ccvs.style.width = window.innerWidth + 'px';
  ccvs.style.height = window.innerHeight + 'px';
  cc.setTransform(DPR, 0, 0, DPR, 0, 0);
}
sizeConfetti();
window.addEventListener('resize', sizeConfetti);

function fireConfetti() {
  pieces = [];
  var cols = ['#e74c6f','#f7c948','#5b9bd5','#a29bfe','#ff8a5c','#2ecc71','#fff','#f8a5c2'];
  for (var i = 0; i < 150; i++) {
    pieces.push({
      x: window.innerWidth * 0.5 + (Math.random() - 0.5) * 240,
      y: window.innerHeight * 0.45,
      vx: (Math.random() - 0.5) * 16,
      vy: -Math.random() * 18 - 5,
      s: Math.random() * 8 + 4,
      r: Math.random() * 360,
      rv: (Math.random() - 0.5) * 18,
      c: cols[Math.floor(Math.random() * cols.length)],
      l: 1,
      shape: Math.random() > 0.5 ? 'rect' : 'circle'
    });
  }
  confettiOn = true;
}

function tickConfetti() {
  if (!confettiOn) return;
  cc.clearRect(0, 0, window.innerWidth, window.innerHeight);
  var alive = 0;
  pieces.forEach(function(p) {
    p.x += p.vx;
    p.vy += 0.38;
    p.y += p.vy;
    p.r += p.rv;
    p.l -= 0.007;
    if (p.l <= 0) return;
    alive++;
    cc.save();
    cc.translate(p.x, p.y);
    cc.rotate(p.r * Math.PI / 180);
    cc.globalAlpha = Math.max(0, p.l);
    cc.fillStyle = p.c;
    if (p.shape === 'circle') {
      cc.beginPath();
      cc.arc(0, 0, p.s / 2, 0, Math.PI * 2);
      cc.fill();
    } else {
      cc.fillRect(-p.s / 2, -p.s / 4, p.s, p.s / 2);
    }
    cc.restore();
  });
  if (alive === 0) {
    confettiOn = false;
    cc.clearRect(0, 0, window.innerWidth, window.innerHeight);
  }
}

/* ── Main Loop ── */
function loop(ts) {
  if (ts - bulbTimer > 400) {
    bulbTick = (bulbTick + 1) % 2;
    bulbTimer = ts;
  }
  draw(ts);
  tickConfetti();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>



</body></html>
